name: Daily Malayalam Tracks Sync

on:
  schedule:
    # Runs at 00:00 UTC daily (5:30 AM IST)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows manual trigger of sync from GitHub Actions tab

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push updated JSON files back to the repository

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/checkout@v4
        # We also need python setup
      
      - name: Set up Python VM
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # caching pip dependencies for faster runs

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

      - name: Execute Aggregation Script
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          python backend/sync_songs.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage the generated files
          git add public/songs.json backend/track_cache.json
          
          # Check if there are changes before committing
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "auto: update daily songs playlist [skip ci]"
            git push
            echo "Changes pushed to repository."
          else
            echo "No changes in playlist. Skipping commit."
          fi
